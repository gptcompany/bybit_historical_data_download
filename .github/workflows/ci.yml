name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, X64, muletto]]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio requests

      - name: Run tests with coverage
        id: coverage
        run: |
          PYTHONPATH=src:. pytest tests/ -v \
            --cov=src/bybit_data_downloader \
            --cov-report=term \
            --cov-report=json \
            --cov-report=xml:coverage.xml
          TOTAL=$(python3 -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Check coverage file
        run: ls -la coverage.xml

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage badge
        if: runner.os == 'Linux' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: bybit_data_downloader_coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.total }}%
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
        continue-on-error: true
